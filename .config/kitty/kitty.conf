##########################################################################
shell /usr/bin/fish 
# themes
include GruvBox_DarkHard.conf
#include Wryan.conf
#include VSCode_Dark.conf

# terminal opacity and blur
dynamic_background_opacity yes
background_opacity 0.9
background_blur 1

# advance 
term xterm-kitty
shell_integration enabled

# terminal bell
enable_audio_bell no

# os specific tweaks (Gnome window decoration for wayland)
linux_display_server wayland
wayland_titlebar_color background

# font
font_family        SauceCodePro Nerd Font
bold_font          auto
italic_font        auto
bold_italic_font   auto
font_size 12.0

# font size management 
map ctrl+shift+backspace change_font_size all 0

# cursor customization
# block / beam / underline
cursor_shape block
cursor_blink_interval 0
cursor_stop_blinking_after 0
shell_integration no-cursor

# scrollback
scrollback_lines 5000
wheel_scroll_multiplier 10.0
touch_scroll_multiplier 10.0
# mouse
mouse_hide_wait -1

# window layout
remember_window_size  no
initial_window_width  1200
initial_window_height 750
window_border_width 1.5pt
enabled_layouts tall
window_padding_width 0
window_margin_width 2
hide_window_decorations no

# window management 
map ctrl+shift+enter new_window
map ctrl+shift+] next_window
map ctrl+shift+[ previous_window

# layout management
map ctrl+shift+l next_layout
map ctrl+alt+r goto_layout tall
map ctrl+alt+s goto_layout stack

# tab bar customization
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_edge bottom
tab_bar_align left
active_tab_font_style   bold
inactive_tab_font_style normal

# tab management
map ctrl+shift+t new_tab
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab
map ctrl+shift+q close_tab
# Copy paste
copy_on_select yes
map ctrl+c        copy_and_clear_or_interrupt
map ctrl+v        paste_from_clipboard
map shift+insert paste_from_clipboard
map Shift+Alt+Left  select stream word left
map Shift+Alt+Right  select stream word right

#
#map f1 launch_tab fish
map f2 launch --type=tab --cwd ~ pwsh
map f3 launch --type=tab --cwd ~ fish

#notifications
notify_on_cmd_finish invisible 20

#cursor
cursor_trail 200
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 2
