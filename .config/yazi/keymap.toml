# [mgr]
# prepend_keymap = [
#   { on = ["M","s"], run = "plugin sshfs -- menu",            desc = "Open SSHFS options" },
# ]
[[mgr.prepend_keymap]]
on   = [ "M","s" ]
run  = "plugin sshfs -- menu"
desc = "Open SSHFS options"

[[mgr.prepend_keymap]]
on   = "!"
for  = "unix"
run  = 'shell "$SHELL" --block'
desc = "Open $SHELL here"

# If you also using Yazi on Windows:
[[mgr.prepend_keymap]]
on   = "!"
for  = "windows"
run  = 'shell "pwsh" --block'
desc = "Open PowerShell here"

[[mgr.prepend_keymap]]
on  = "y"
run = [ 'shell -- for path in %s; do echo "file://$path"; done | wl-copy -t text/uri-list', "yank" ]

[[mgr.prepend_keymap]]
on   = "l"
run  = "plugin smart-enter"
desc = "Enter the child directory, or open the file"
